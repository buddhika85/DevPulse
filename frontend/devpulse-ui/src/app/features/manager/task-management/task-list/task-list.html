<div class="page-header">
  <h1>My Teams - Tasks</h1>
</div>

<button
  class="azure-btn"
  (click)="add()"
  style="margin-bottom: 1%"
  [disabled]="true"
>
  Add Task & Assign
</button>

<app-generic-table
  [columns]="columns"
  [data]="tasksOfUser"
  [actions]="actions"
  [pageSizeOptions]="pageSizeOptions"
  (actionTriggered)="handleAction($event)"
>
</app-generic-table>
