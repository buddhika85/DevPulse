<div class="page-header">
  <h1>My Journals & Feedbacks</h1>
</div>

<button
  class="azure-btn"
  (click)="writeJournal()"
  style="margin-bottom: 1%"
  [disabled]="false"
>
  Write Journal
</button>

<app-generic-table
  [columns]="columns"
  [data]="journalsOfUser"
  [actions]="actions"
  [pageSizeOptions]="pageSizeOptions"
  (actionTriggered)="handleAction($event)"
>
</app-generic-table>
