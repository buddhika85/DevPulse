# Trigger the pipeline when code is pushed to the 'main' branch
trigger:
  branches:
    include:
      - main

# Define reusable variables for ACR, ACA, and deployment settings
variables:
  acrName: devpulseacr
  acrLoginServer: devpulseacr-cta8h8feeua4cchz.azurecr.io

  imageName: task-journal-link-api
  resourceGroup: DevPulseRG
  containerAppName: task-journal-link-api
  location: australiaeast

  # IMPORTANT:
  # Keep tag simple here. Timestamp will be generated inside the script.
  tag: $(Build.BuildId)                                                     # unique build ID generated by AzDevOps    

# Give me a hosted build agent running Ubuntu Linux.
# why ubuntu? because docker is native to Linux, uses features in Linux kernel internaly, so faster and optimal for docker
pool:
  vmImage: ubuntu-latest

steps:
  # Step 1: Run Unit Tests in TaskJournalLinkService.Tests,
  # generate .trx  files & publish them to Azure DevOps & then show a Tests tab in the pipeline
  - task: DotNetCoreCLI@2
    displayName: 'Run Unit Tests'
    inputs:
      command: test                                                         # run dotnet test command
      projects: 'unitTesting/TaskJournalLinkService.Tests/TaskJournalLinkService.Tests.csproj'
      arguments: '--logger trx'                                             # visual studio test result format file which dev ops understands

  - task: PublishTestResults@2
    displayName: 'Publish Test Results'
    inputs:
      testResultsFormat: 'VSTest'
      testResultsFiles: '$(Agent.TempDirectory)/**/*.trx'
      failTaskOnFailedTests: true                                           # if any test fails, fail this PublishTestResults task, & fail the pipeline (prevents deployment on test failures)

  # Step 2: Build docker image and push to ACR with new tag, 
  # Ask ACA to pull newly pushed image from ACR
  - task: AzureCLI@2
    displayName: 'Build Docker Image and Deploy to ACA'
    inputs:
      azureSubscription: 'DevPulse-SP-AzContainerReg-ACA'                   # Azure subscription means the service principal we used to let the Azure DevOps agent access Azure resources.
      scriptType: bash
      scriptLocation: inlineScript                                          # all scripts are with in this .yml file not in separate .sh files
      failOnStderr: true                                                    # fail the pipeline on any error
      inlineScript: |                                                       # everthing below this line belongs to script block
        echo "Generating timestamp-based tag..."

        # Generate timestamp safely inside Bash
        timestamp=$(date +'%Y%m%d-%H%M%S')                                  # datestampt format : 2026 04 05-00 05 12

        # Combine timestamp + BuildId                                       # 20260405-000512-1169  -- 1169 is unique build ID generated by AzDevOps    
        fulltag="${timestamp}-$(tag)"

        echo "Using image tag: $fulltag"
        echo "Full image path: $(acrLoginServer)/$(imageName):$fulltag"

        echo "Building and pushing image to ACR..."



        # Build the Docker image in Azure ACR Tasks using the specified Dockerfile - inside backend/TaskJournalLinkService folder
        # (build happens in Azure, not on the DevOps agent - so AzDevOps agent does not need Docker engine)
        # ACR then automatically tags the image as $(imageName):$fulltag and pushes it into the ACR repository 
        az acr build \
          --registry $(acrName) \
          --image $(imageName):$fulltag \
          --file backend/TaskJournalLinkService/Dockerfile \
          .

        echo "Deploying to Azure Container Apps..."

        # Force ACA to pull the new image by using a unique revision suffix
        az containerapp update \
          --name $(containerAppName) \
          --resource-group $(resourceGroup) \
          --image $(acrLoginServer)/$(imageName):$fulltag \
          --revision-suffix $fulltag


  # Step 3: Warm up the ACA endpoint to avoid cold start latency
  # This ensures the service is responsive immediately after deployment.
  # We ping the health endpoint up to 10 times with 5‑second gaps. If we receive HTTP 200, we break early and the service is considered warm. Otherwise, we keep retrying until all 10 attempts are used.
  # HEAD request for pinging - because it never contains the HTTP Body (But GET does). So, lightweight, no body to download, fast, ideal for pinging. Can just check Request lines Status Code and decide.
  - script: |
      echo "Warming up Task-Journal-Link-Service..."
      for i in {1..10}; do
        response=$(curl -X HEAD -s -o /dev/null -w "%{http_code}" https://task-journal-link-api.yellowcoast-35d1851f.australiasoutheast.azurecontainerapps.io/api/Health)
        echo "Attempt $i: HTTP $response"
        if [ "$response" -eq 200 ]; then
          echo "Success - Task-Journal-Link-Service is warm."
          break
        fi
        sleep 5
      done
    displayName: 'Warm up Task-Journal-Link-Service after deploy'
    condition: succeeded()  # Only run this step if the previous deployment succeeded